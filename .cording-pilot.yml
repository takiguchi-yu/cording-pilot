# cording-pilot 設定ファイル
#
# 凡例:
# - [必須] 省略すると validate でエラー
# - [条件付き必須] 条件を満たす場合のみ必須
# - [任意] 省略可能（未指定時はデフォルト補完）
#
# 最低限動かすだけなら `version` のみでも起動可能です。
# ただし実運用では、少なくとも `llm.provider` と `llm.model` は明示推奨です。

# [必須] スキーマバージョン。現在は "1.0" 固定。
version: "1.0"

# [任意] プロジェクト情報（表示・文脈用）。
project:
  # [任意] 対象言語（例: go, python, typescript）。未指定時: "go"
  language: "go"
  # [任意] テストフレームワーク名。未指定時: "standard testing"
  test_framework: "standard testing"

# [任意] 各エージェントのシステムプロンプト上書き。
# 未指定時は組み込みデフォルトを使用。
agents:
  # [任意]
  planner: |-
    あなたは優秀なソフトウェアアーキテクトです。
    与えられた要件を分析し、実装計画（目的・仕様・影響範囲）を日本語のMarkdown形式で出力してください。
  # [任意]
  coder: |-
    あなたは熟練のエンジニアです。
    テストコードまたはプロダクトコードの生成を求められます。
    余分な説明やMarkdownコードブロックは含めず、以下のJSONスキーマに厳密に従って出力してください。

    {"files":[{"path":"ファイルのパス","content":"ファイルの内容"}]}

    - path にはリポジトリルートからの相対パスを指定してください。
    - content にはファイルの完全な内容を文字列として指定してください。
    - ファイルの拡張子やディレクトリ構造は、対象言語のベストプラクティスおよび既存のリポジトリ構成に従うこと。
  # [任意]
  reviewer: |-
    あなたは厳格なコードレビュアーです。
    差分と要件を突き合わせてレビューし、結果を "Approve" または "Request Changes" のいずれかで冒頭に明示してください。
    問題点がある場合は具体的な修正点を列挙してください。

# [任意] LLM 設定。
# 補足:
# - provider=copilot の場合、実行時に GITHUB_TOKEN が必要です。
# - provider=ollama の場合、通常 base_url を指定します。
llm:
  # [任意] 使用するプロバイダー: copilot / ollama。未指定時: "copilot"
  provider: "ollama"
  # [任意] 既定モデル。未指定時: "gpt-4.1"
  model: "qwen3-coder-next"
  # [任意] API ベース URL（例: Ollama）。未指定可。
  base_url: "http://localhost:11434/v1"
  # [任意] 自己修復フェーズ用モデル。未指定時: model を使用。
  auto_fix_model: "qwen3-coder-next"
  # [任意] Interactive の確認質問で使うモデル。未指定時: model を使用。
  planner_clarification_model: "qwen3-coder-next"
  # [任意] Plan/CompileIssue で使うモデル。未指定時: model を使用。
  planner_plan_model: "qwen3-coder-next"
  # [任意] Coder で使うモデル。未指定時: model を使用。
  coder_model: "qwen3-coder-next"
  # [任意] Reviewer で使うモデル。未指定時: model を使用。
  reviewer_model: "qwen3-coder-next"
  # [任意] リトライ設定。
  retry:
    # [任意] 1 以上。未指定時: 3
    attempts: 2
    # [任意] 0 以上(ms)。未指定時: 500
    initial_delay_ms: 1000
    # [任意] 1.0 以上。未指定時: 2.0
    multiplier: 2.0
  # [任意] レート制御（429 など）
  rate_limit:
    # [任意] fail_fast / honor_wait。未指定時: fail_fast
    mode: "honor_wait"
    # [任意] 0 以上(秒)。未指定時: 30
    max_wait_seconds: 120

# [任意] 実行環境。
environment:
  # [任意] local / docker / nix。未指定時: "local"
  type: "local"
  # [条件付き必須] type=docker のとき必須。未指定時(かつ docker): 既定値を補完
  image: "golangci/golangci-lint:latest"

# [任意] プロジェクト固有の知識ソース。
# Planner / Coder のプロンプトに動的注入されます。
# ファイルまたはディレクトリを指定できます。
# ディレクトリ指定時は配下の .md / .txt のみ再帰的に読み込みます。
knowledge:
  - ".github/copilot-instructions.md"
  - "docs/architecture.md"
  - "docs/rules/"

# [任意] 実行前の自動修復ステップ（失敗しても継続）。
# 各要素の name/command は、要素を定義するなら必須。
# リスト自体を省略した場合は既定ステップを補完。
auto_fix:
  - name: "tidy"
    command: "go mod tidy"
  - name: "format"
    command: "go fmt ./..."

# [任意] 品質ゲート用パイプライン（順次実行）。
# 各要素の name/command は必須。
# リストを省略した場合は既定パイプラインを補完。
pipeline:
  - name: "goimports"
    command: "goimports -w ."
  - name: "format"
    command: "go fmt ./..."
  - name: "typecheck"
    command: "go build ./..."
  - name: "lint"
    command: "golangci-lint run"
  - name: "test"
    command: "go test -v ./..."
