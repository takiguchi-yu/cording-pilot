version: "1.0"

llm:
  # 使用する LLM プロバイダー（現在対応: copilot）
  provider: "copilot"
  # 使用するモデル名
  model: "gpt-4o"

environment:
  # 実行環境の種類: local（デフォルト）, docker, nix
  # - local: ホストマシンで直接実行
  # - docker: Docker コンテナ内で実行（image フィールドが必要）
  # - nix: リポジトリの flake.nix を使用して nix develop 環境内で実行
  type: "local"
  # Docker コンテナ実行時に使用するイメージ（type: docker の場合のみ参照）。
  # golangci-lint イメージには go, golangci-lint, goimports が含まれています。
  image: "golangci/golangci-lint:latest"

pipeline:
  - name: "format"
    command: "go fmt ./..."

  - name: "typecheck"
    command: "go build ./..."

  - name: "lint"
    command: "golangci-lint run"

  - name: "test"
    command: "go test -v ./..."
