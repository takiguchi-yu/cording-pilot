name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: format-build-lint-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting (gofmt + goimports)
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          gofmt -w .
          goimports -w .
          if ! git diff --exit-code; then
            echo "Formatting check failed. Please run: gofmt -w . && goimports -w ."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

      - name: Test
        run: go test -v ./...
