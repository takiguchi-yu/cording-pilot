name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version
        id: version
        run: |
          VERSION="v$(date -u +%Y%m%d%H%M%S)-$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.version }}"
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/cording-pilot-linux-amd64   ./cmd/orchestrator
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/cording-pilot-linux-arm64   ./cmd/orchestrator
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/cording-pilot-darwin-amd64  ./cmd/orchestrator
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/cording-pilot-darwin-arm64  ./cmd/orchestrator
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/cording-pilot-windows-amd64.exe ./cmd/orchestrator

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > checksums.txt

      - name: Create tag and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
